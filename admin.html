<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行程后台管理</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">⚙</div>
      <div>
        <strong>行程后台管理</strong>
        <span>Admin Dashboard</span>
      </div>
    </div>

    <button id="logoutBtn" class="btn light hidden" type="button">退出登录</button>
  </header>

  <main class="container">
    <section id="loginPanel" class="card login-card">
      <h1>后台登录</h1>
      <p>请输入管理员邮箱和密码。</p>

      <form id="loginForm" class="form single">
        <label>
          邮箱
          <input id="email" type="email" required placeholder="admin@example.com" />
        </label>

        <label>
          密码
          <input id="password" type="password" required placeholder="请输入密码" />
        </label>

        <button class="btn full" type="submit">登录后台</button>
      </form>
    </section>

    <section id="adminPanel" class="hidden">
      <section class="hero admin-hero">
        <div class="hero-content">
          <p class="eyebrow">Admin Console</p>
          <h1>后台管理</h1>
          <p>
            新增行程、编辑行程、上传封面图、设置费用信息，并查看报名记录与导出 CSV。
          </p>

          <div class="stats">
            <div>
              <strong id="adminTripCount">0</strong>
              <span>行程数量</span>
            </div>
            <div>
              <strong id="adminRegCount">0</strong>
              <span>报名记录</span>
            </div>
          </div>
        </div>

        <div class="hero-art" aria-hidden="true">
          <div class="sun"></div>
          <div class="line line-1"></div>
          <div class="line line-2"></div>
          <div class="line line-3"></div>
        </div>
      </section>

      <div class="tabs">
        <button class="active" data-tab="trips" type="button">行程管理</button>
        <button data-tab="registrations" type="button">报名信息</button>
      </div>

      <section id="tripsTab">
        <div class="admin-layout">
          <div class="card form-card">
            <div class="card-title-group">
              <h2 id="tripFormTitle">新增行程</h2>
              <p id="tripFormDesc">填写行程基础信息，上传封面图后会展示在前台行程卡片中。</p>
            </div>

            <form id="tripForm" class="form">
              <input type="hidden" id="editTripId" />

              <label class="full">
                行程标题 <span class="required">*</span>
                <input
                  id="title"
                  required
                  placeholder="例如：杭州两日灵感之旅"
                />
              </label>

              <label>
                目的地
                <input
                  id="destination"
                  placeholder="例如：杭州"
                />
              </label>

              <label>
                类型
                <input
                  id="tripType"
                  placeholder="例如：探秘海岛 / 短途自驾"
                />
              </label>

              <label>
                开始日期
                <input id="startDate" type="date" />
              </label>

              <label>
                结束日期
                <input id="endDate" type="date" />
              </label>

              <label>
                集合时间
                <input
                  id="meetTime"
                  placeholder="例如：09:00 / 周五晚 18:30"
                />
              </label>

              <label>
                人数上限
                <input
                  id="personLimit"
                  type="number"
                  min="1"
                  placeholder="例如：20"
                />
              </label>

              <label>
                金额
                <input
                  id="price"
                  type="number"
                  min="0"
                  step="0.01"
                  placeholder="例如：398"
                />
              </label>

              <label class="full">
                费用包含
                <input
                  id="priceIncludes"
                  value="全程用车费、过路费、停车费"
                  placeholder="例如：全程用车费、过路费、停车费"
                />
              </label>

              <label class="full">
                集合地点
                <input
                  id="meetPlace"
                  placeholder="例如：杭州东站到达层集合"
                />
              </label>

              <div class="full upload-field">
                <label for="tripImage">
                  行程封面图
                  <span class="field-tip">支持 JPG、PNG、WEBP、GIF，建议横图，大小不超过 5MB。编辑时重新选择图片会替换原封面。</span>
                </label>

                <input
                  id="tripImage"
                  type="file"
                  accept="image/jpeg,image/png,image/webp,image/gif"
                />

                <div id="tripImagePreview" class="image-preview hidden"></div>
              </div>

              <label class="full">
                行程说明
                <textarea
                  id="description"
                  placeholder="请输入行程说明。支持换行，例如：

Day0 周五：
杭州出发 → 抵达目的地

Day1 周六：
景点打卡 → 晚餐 → 住宿

Day2 周日：
自由活动 → 返回"
                ></textarea>
                <span class="field-tip">前台会按你输入的换行展示。</span>
              </label>

              <div class="form-actions full">
                <button id="saveTripBtn" class="btn full" type="submit">保存行程</button>
                <button id="cancelEditBtn" class="btn light full hidden" type="button">取消编辑</button>
              </div>
            </form>
          </div>

          <div class="card list-card">
            <div class="card-head">
              <div>
                <h2>行程列表</h2>
                <p>查看当前所有行程、报名人数和开放状态。关闭后用户无法继续报名。</p>
              </div>
              <button class="btn light" id="reloadTripsBtn" type="button">刷新</button>
            </div>

            <div id="adminTripList"></div>
          </div>
        </div>
      </section>

      <section id="registrationsTab" class="hidden">
        <div class="card">
          <div class="card-head">
            <div>
              <h2>报名信息</h2>
              <p>查看所有用户提交的报名记录，可按行程筛选并导出 CSV。</p>
            </div>
            <button class="btn light" id="exportBtn" type="button">导出 CSV</button>
          </div>

          <label class="filter">
            按行程筛选
            <select id="tripFilter"></select>
          </label>

          <div id="registrationList"></div>
        </div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/admin.js"></script>
</body>
</html>
