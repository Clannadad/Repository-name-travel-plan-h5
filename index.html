<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>近期行程计划报名</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">✈</div>
      <div>
        <strong>近期行程计划</strong>
        <span>Travel Plan Registration</span>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>我的近期行程计划</h1>
      <p>选择你感兴趣的行程，填写基础信息即可报名。同一个用户 ID、设备 ID、浏览器 ID 或手机号对同一个计划只能提交一次。</p>

      <div class="stats">
        <div>
          <strong id="tripCount">0</strong>
          <span>当前行程</span>
        </div>
        <div>
          <strong>安全限制</strong>
          <span>防重复报名</span>
        </div>
      </div>
    </section>

    <section class="section-head">
      <div>
        <h2>可报名行程</h2>
        <p>请选择一个计划提交报名信息</p>
      </div>
      <button class="btn light" id="refreshBtn">刷新</button>
    </section>

    <section id="tripList" class="trip-grid"></section>
  </main>

  <div id="modal" class="modal-mask">
    <div class="modal">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle">行程报名</h3>
          <p id="modalMeta"></p>
        </div>
        <button id="closeModal" class="icon-btn">×</button>
      </div>

      <div class="notice">
        请准确填写信息。提交后同一用户 ID、设备 ID、浏览器 ID 或手机号不能再次报名同一行程。
      </div>

      <form id="signupForm" class="form">
        <input type="hidden" id="tripId" />

        <label>
          用户 ID / 微信号
          <input id="userIdText" required placeholder="例如：微信号、昵称、内部ID" />
        </label>

        <label>
          姓名
          <input id="name" required placeholder="请输入姓名" />
        </label>

        <label>
          手机号
          <input id="phone" required placeholder="请输入手机号" />
        </label>

        <label>
          同行人数
          <input id="peopleCount" type="number" min="1" value="1" required />
        </label>

        <label class="full">
          备注
          <textarea id="remark" placeholder="例如：饮食偏好、是否需要拼车、其他说明"></textarea>
        </label>

        <button class="btn full" type="submit">确认提交报名</button>

        <p id="deviceInfo" class="device-info"></p>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/index.js"></script>
</body>
</html>
